<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Fun 🐦</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:linear-gradient(skyblue, lightgreen);
}

#bird{
  width:40px;
  height:40px;
  background:yellow;
  border-radius:50%;
  position:absolute;
  top:200px;
  left:60px;
}

.pipe{
  width:60px;
  background:linear-gradient(green, darkgreen);
  position:absolute;
  border-radius:10px;
}

#score{
  position:absolute;
  top:10px;
  width:100%;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="bird"></div>
<div id="score">Score: 0</div>

<script>

// 🔊 sounds
let tapSound = new Audio("https://www.myinstants.com/en/instant/modi-modi-modi-modi-kids-27626/?utm_source=copy&utm_medium=share");
let scoreSound = new Audio("https://www.myinstants.com/en/instant/trigger-digga-54138/?utm_source=copy&utm_medium=share");
let crashSound = new Audio("https://www.myinstants.com/en/instant/laure-na-bhujjam-x-modi-56173/?utm_source=copy&utm_medium=share");

let bird = document.getElementById("bird");
let gravity = 0.8;
let lift = -12;
let velocity = 0;
let score = 0;

let pipes = [];

// tap / click
document.addEventListener("touchstart", jump);
document.addEventListener("click", jump);

function jump(){
  velocity = lift;
  tapSound.play();
}

// game loop
function gameLoop(){

  velocity += gravity;
  bird.style.top = (bird.offsetTop + velocity) + "px";

  // create pipes
  if(Math.random() < 0.02){
    let gap = 150;
    let topHeight = Math.random()*200 + 50;

    let topPipe = document.createElement("div");
    topPipe.classList.add("pipe");
    topPipe.style.height = topHeight + "px";
    topPipe.style.top = "0";
    topPipe.style.left = "100%";

    let bottomPipe = document.createElement("div");
    bottomPipe.classList.add("pipe");
    bottomPipe.style.height = (window.innerHeight - topHeight - gap) + "px";
    bottomPipe.style.bottom = "0";
    bottomPipe.style.left = "100%";

    document.body.appendChild(topPipe);
    document.body.appendChild(bottomPipe);

    pipes.push({top:topPipe, bottom:bottomPipe, passed:false});
  }

  // move pipes
  pipes.forEach((p)=>{
    let left = p.top.offsetLeft - 2;
    p.top.style.left = left + "px";
    p.bottom.style.left = left + "px";

    // score
    if(left < 60 && !p.passed){
      score++;
      document.getElementById("score").innerText = "Score: " + score;
      scoreSound.play();
      p.passed = true;
    }

    // collision
    let b = bird.getBoundingClientRect();
    let t = p.top.getBoundingClientRect();
    let bo = p.bottom.getBoundingClientRect();

    if(
      b.left < t.right &&
      b.right > t.left &&
      (b.top < t.bottom || b.bottom > bo.top)
    ){
      gameOver();
    }

  });

  // ground / sky
  if(bird.offsetTop > window.innerHeight || bird.offsetTop < 0){
    gameOver();
  }

  requestAnimationFrame(gameLoop);
}

// game over
function gameOver(){
  crashSound.play();
  setTimeout(()=>{
    alert("Game Over 😂 Score: " + score);
    location.reload();
  },200);
}

gameLoop();

</script>

</body>
</html>
