<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Pro 🐦</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#70c5ce;
}

#game{
  position:relative;
  width:100%;
  height:100vh;
  overflow:hidden;
}

#bird{
  width:50px;
  height:35px;
  background:url('https://i.imgur.com/8QfQ5ZB.png') no-repeat center;
  background-size:cover;
  position:absolute;
  top:200px;
  left:60px;
}

.pipe{
  width:70px;
  position:absolute;
  background:#228B22;
}

#score{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  font-size:28px;
  color:white;
  font-weight:bold;
  text-shadow:2px 2px black;
}

#start{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:15px 25px;
  font-size:20px;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="game">
  <div id="bird"></div>
  <div id="score">0</div>
  <button id="start">Start Game 🚀</button>
</div>

<script>

let bird = document.getElementById("bird");
let scoreText = document.getElementById("score");
let startBtn = document.getElementById("start");

let gravity = 0.5;
let lift = -9;
let velocity = 0;
let score = 0;
let pipes = [];
let running = false;

// jump
document.addEventListener("click", ()=>{
  if(running){
    velocity = lift;
  }
});

// start game
startBtn.onclick = ()=>{
  startBtn.style.display = "none";
  running = true;
  loop();
};

function loop(){

  if(!running) return;

  velocity += gravity;
  let newTop = bird.offsetTop + velocity;
  bird.style.top = newTop + "px";

  // create pipe
  if(Math.random() < 0.02){
    let gap = 180;
    let topHeight = Math.random()*200 + 50;

    let topPipe = document.createElement("div");
    topPipe.className = "pipe";
    topPipe.style.height = topHeight + "px";
    topPipe.style.top = "0";
    topPipe.style.left = "100%";

    let bottomPipe = document.createElement("div");
    bottomPipe.className = "pipe";
    bottomPipe.style.height = (window.innerHeight - topHeight - gap) + "px";
    bottomPipe.style.bottom = "0";
    bottomPipe.style.left = "100%";

    document.getElementById("game").appendChild(topPipe);
    document.getElementById("game").appendChild(bottomPipe);

    pipes.push({top:topPipe, bottom:bottomPipe, passed:false});
  }

  pipes.forEach(p=>{
    let left = p.top.offsetLeft - 2;
    p.top.style.left = left + "px";
    p.bottom.style.left = left + "px";

    if(left < 60 && !p.passed){
      score++;
      scoreText.innerText = score;
      p.passed = true;
    }

    let b = bird.getBoundingClientRect();
    let t = p.top.getBoundingClientRect();
    let bo = p.bottom.getBoundingClientRect();

    if(
      b.left < t.right &&
      b.right > t.left &&
      (b.top < t.bottom || b.bottom > bo.top)
    ){
      gameOver();
    }

  });

  // boundary
  if(newTop > window.innerHeight - 40 || newTop < 0){
    gameOver();
  }

  requestAnimationFrame(loop);
}

function gameOver(){
  running = false;
  alert("Game Over 😅 Score: " + score);
  location.reload();
}

</script>

</body>
</html>
