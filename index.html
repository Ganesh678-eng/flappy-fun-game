<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Fun 🐦</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:linear-gradient(skyblue, lightgreen);
}

#bird{
  width:40px;
  height:40px;
  background:yellow;
  border-radius:50%;
  position:absolute;
  top:200px;
  left:60px;
}

.pipe{
  width:60px;
  background:green;
  position:absolute;
}

#score{
  position:absolute;
  top:10px;
  width:100%;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}

#startBtn{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:15px 25px;
  font-size:20px;
  background:black;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="bird"></div>
<div id="score">Score: 0</div>
<button id="startBtn">Start Game 🚀</button>

<script>

let bird = document.getElementById("bird");
let gravity = 0.4;
let lift = -8;
let velocity = 0;
let score = 0;
let pipes = [];
let gameRunning = false;

// tap
document.addEventListener("touchstart", jump);
document.addEventListener("click", jump);

function jump(){
  if(gameRunning){
    velocity = lift;
  }
}

// start button
document.getElementById("startBtn").onclick = function(){
  this.style.display = "none";
  gameRunning = true;
  gameLoop();
};

function gameLoop(){

  if(!gameRunning) return;

  velocity += gravity;
  bird.style.top = (bird.offsetTop + velocity) + "px";

  // pipe create
  if(Math.random() < 0.015){
    let gap = 200;
    let topHeight = Math.random()*150 + 50;

    let topPipe = document.createElement("div");
    topPipe.classList.add("pipe");
    topPipe.style.height = topHeight + "px";
    topPipe.style.top = "0";
    topPipe.style.left = "100%";

    let bottomPipe = document.createElement("div");
    bottomPipe.classList.add("pipe");
    bottomPipe.style.height = (window.innerHeight - topHeight - gap) + "px";
    bottomPipe.style.bottom = "0";
    bottomPipe.style.left = "100%";

    document.body.appendChild(topPipe);
    document.body.appendChild(bottomPipe);

    pipes.push({top:topPipe, bottom:bottomPipe, passed:false});
  }

  pipes.forEach((p)=>{
    let left = p.top.offsetLeft - 1.5; // slow speed
    p.top.style.left = left + "px";
    p.bottom.style.left = left + "px";

    if(left < 60 && !p.passed){
      score++;
      document.getElementById("score").innerText = "Score: " + score;
      p.passed = true;
    }

    let b = bird.getBoundingClientRect();
    let t = p.top.getBoundingClientRect();
    let bo = p.bottom.getBoundingClientRect();

    if(
      b.left < t.right &&
      b.right > t.left &&
      (b.top < t.bottom || b.bottom > bo.top)
    ){
      gameOver();
    }

  });

  if(bird.offsetTop > window.innerHeight - 40 || bird.offsetTop < 0){
    gameOver();
  }

  requestAnimationFrame(gameLoop);
}

function gameOver(){
  gameRunning = false;
  alert("Game Over 😅 Score: " + score);
  location.reload();
}

</script>

</body>
</html>
