<!DOCTYPE html>
<html>
<head>
<title>Flappy Fun 😂🐦</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  overflow:hidden;
  background:skyblue;
}

#bird{
  width:40px;
  height:40px;
  background:yellow;
  border-radius:50%;
  position:absolute;
  top:200px;
  left:50px;
}

.pipe{
  width:60px;
  background:green;
  position:absolute;
}

#score{
  position:absolute;
  top:10px;
  left:10px;
  font-size:20px;
  color:black;
}
</style>
</head>

<body>

<div id="bird"></div>
<div id="score">Score: 0</div>

<script>

let bird = document.getElementById("bird");
let gravity = 2;
let lift = -25;
let velocity = 0;
let score = 0;

let pipes = [];

// 🔊 SOUND LINKS 
let tapSound = new Audio("https://www.myinstants.com/en/instant/modi-modi-modi-modi-kids-27626/?utm_source=copy&utm_medium=share");
let passSound = new Audio("https://www.myinstants.com/en/instant/trigger-digga-54138/?utm_source=copy&utm_medium=share");
let crashSound = new Audio("https://www.myinstants.com/en/instant/laure-na-bhujjam-x-modi-56173/?utm_source=copy&utm_medium=share");

// tap control
document.addEventListener("touchstart", ()=>{
  velocity = lift;
  tapSound.play(); // 🔊 tap sound
});

// game loop
function gameLoop(){

  velocity += gravity;
  let top = bird.offsetTop + velocity;
  bird.style.top = top + "px";

  // create pipe
  if(Math.random() < 0.02){
    let gap = 120;
    let pipeTop = Math.random()*200;

    let topPipe = document.createElement("div");
    topPipe.classList.add("pipe");
    topPipe.style.height = pipeTop + "px";
    topPipe.style.top = "0px";
    topPipe.style.left = "100%";

    let bottomPipe = document.createElement("div");
    bottomPipe.classList.add("pipe");
    bottomPipe.style.height = (window.innerHeight - pipeTop - gap) + "px";
    bottomPipe.style.bottom = "0px";
    bottomPipe.style.left = "100%";

    document.body.appendChild(topPipe);
    document.body.appendChild(bottomPipe);

    pipes.push({top:topPipe, bottom:bottomPipe, passed:false});
  }

  // move pipes
  pipes.forEach((p,i)=>{
    let left = p.top.offsetLeft - 3;
    p.top.style.left = left + "px";
    p.bottom.style.left = left + "px";

    // score
    if(left < 50 && !p.passed){
      score++;
      document.getElementById("score").innerText = "Score: " + score;
      passSound.play(); // 🔊 pass sound
      p.passed = true;
    }

    // collision
    let birdRect = bird.getBoundingClientRect();
    let topRect = p.top.getBoundingClientRect();
    let bottomRect = p.bottom.getBoundingClientRect();

    if(
      birdRect.left < topRect.right &&
      birdRect.right > topRect.left &&
      (birdRect.top < topRect.bottom || birdRect.bottom > bottomRect.top)
    ){
      crash();
    }

  });

  // ground collision
  if(top > window.innerHeight || top < 0){
    crash();
  }

  requestAnimationFrame(gameLoop);
}

// crash
function crash(){
  crashSound.play(); // 🔊 crash sound
  alert("Game Over 😂 Score: " + score);
  location.reload();
}

gameLoop();

</script>

</body>
  </html>
